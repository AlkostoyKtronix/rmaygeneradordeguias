<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tipificador - Alkosto & Ktronix</title>
<style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 0;
  }
  h1 {
    text-align: center;
    color: #0054A6;
    background: #fff;
    padding: 20px 0;
    margin: 0 0 20px 0;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  
  /* Contenedor para el mensaje de bienvenida y botón de cerrar sesión */
  .header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background: #fff;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  
  .bienvenida {
    font-weight: bold;
    color: #0054A6;
    text-align: center;
    flex-grow: 1;
  }
  
  .tabs {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 25px;
  }
  .tab {
    padding: 12px 25px;
    background: #d9d9d9;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
  }
  .tab:hover { background: #bbb; }
  .active {
    background: #FF6600;
    color: white;
  }
  .section {
    display: none;
    background: white;
    padding: 25px;
    border-radius: 10px;
    max-width: 950px;
    margin: auto;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  }
  .visible { display: block; }
  form label {
    display: block;
    margin-top: 15px;
    font-weight: 600;
  }
  input, select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    margin-top: 5px;
    font-size: 14px;
  }
  button {
    background: #FF6600;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    margin-top: 20px;
    font-weight: bold;
    transition: 0.3s;
  }
  button:hover { background: #e65c00; }
  .message {
    text-align: center;
    margin-top: 15px;
    padding: 12px;
    border-radius: 6px;
    font-weight: bold;
    display: none;
  }
  .success { background: #d4edda; color: #155724; }
  .error { background: #f8d7da; color: #721c24; }

  /* ==== ESTILOS NUEVOS PARA VER REGISTROS ==== */
  .filter-container {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    margin-bottom: 20px;
  }
  .filter-container h2 {
    margin-top: 0;
    color: #0054A6;
    text-align: center;
    font-size: 22px;
    margin-bottom: 15px;
  }
  .filters {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-bottom: 15px;
  }
  .filter-actions {
    display: flex;
    justify-content: center;
    gap: 15px;
  }
  .filter-actions button {
    background: #0054A6;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
  }
  .filter-actions button:hover { background: #003d7a; }
  .table-wrapper {
    overflow-x: auto;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    margin-bottom: 20px;
  }
  #records-table {
    width: 100%;
    border-collapse: collapse;
  }
  #records-table th {
    background: #0054A6;
    color: white;
    padding: 12px;
    text-align: center;
    position: sticky;
    top: 0;
  }
  #records-table td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #e0e0e0;
  }
  #records-table tr:hover { background-color: #f3f6fa; }
  
  /* ==== ESTILOS PARA PAGINACIÓN ==== */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-top: 20px;
    padding: 15px;
    background: #f8f9fa;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  
  .pagination button {
    background: #0054A6;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    margin: 0;
  }
  
  .pagination button:hover:not(:disabled) {
    background: #003d7a;
  }
  
  .pagination button:disabled {
    background: #cccccc;
    cursor: not-allowed;
  }
  
  .pagination-info {
    font-weight: bold;
    color: #0054A6;
    margin: 0 15px;
  }
  
  .page-numbers {
    display: flex;
    gap: 5px;
  }
  
  .page-btn {
    background: #e9ecef;
    color: #0054A6;
    border: 1px solid #dee2e6;
    padding: 5px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: 0.3s;
  }
  
  .page-btn.active {
    background: #0054A6;
    color: white;
  }
  
  .page-btn:hover:not(.active) {
    background: #dae0e5;
  }
</style>
</head>
<body>

<script>
  // Verifica si hay sesión activa
  if (!localStorage.getItem("userCedula")) {
    window.location.href = "login.html";
  }
</script>

<!-- Contenedor para el mensaje de bienvenida y botón de cerrar sesión -->
<div class="header-container">
  <div class="bienvenida">
    Bienvenido, <span id="nombreUsuario"></span>
  </div>
  
  <button onclick="cerrarSesion()" style="background-color:#333;color:white;border:none;padding:12px 20px;border-radius:5px;cursor:pointer;">
    Cerrar Sesión
  </button>
</div>

<script>
  document.getElementById("nombreUsuario").textContent = localStorage.getItem("userName") || "";
</script>

<script>
  function cerrarSesion() {
    localStorage.removeItem("userCedula");
    localStorage.removeItem("userName");
    window.location.href = "login.html";
  }
</script>

<h1>Tipificador Alkosto & Ktronix</h1>

<div class="tabs">
  <div id="tab-form" class="tab active">Registrar Caso</div>
  <div id="tab-records" class="tab">Ver Registros</div>
</div>

<!-- FORMULARIO -->
<div id="form-section" class="section visible">
  <form id="case-form">
    <label>CASO</label>
    <input type="number" id="caso" required>

    <label>GESTOR</label>
    <input type="text" id="gestor" value="Johan Sebastian Ovalle Cardenas (Postventa A2)" readonly>

    <label>FECHA</label>
    <input type="text" id="fecha" readonly>

    <label>TIPO</label>
    <select id="tipo" required>
      <option value="">Seleccione...</option>
      <option>QUEJA</option><option>SOLICITUD</option><option>ODS</option><option>INFORMACION</option>
    </select>

    <label>CLASE</label>
    <select id="clase" required>
      <option value="">Seleccione...</option>
      <option>APROBACION PAK</option><option>ASESORIA</option><option>CANCELACION DE LA RECOGIDA</option>
      <option>DETERIORADO</option><option>FALLA TECNICA / CALIDAD MENOR A 30 DIAS</option>
      <option>GARANTIA DE LA INSTALACION</option><option>GARANTIA POR PRIMERA VEZ</option>
      <option>INCONSISTENCIA EN CARACTERISTICAS</option><option>INCOMPLETO</option>
      <option>INFORMACION</option><option>INGRESO PARA TRÁMITE DE GARANTIA</option>
      <option>INSATISFACCION</option><option>MALA ASESORIA</option><option>ODS</option>
      <option>PRODUCTO TROCADO</option><option>YA ESTUVO EN GARANTIA</option>
    </select>

    <label>ORIGEN</label>
    <select id="origen" required>
      <option value="">Seleccione...</option>
      <option>Devuelve tu pedido</option><option>Escrito</option><option>Llamada</option>
      <option>Portal</option><option>Presencial</option><option>Telefono</option><option>Whatsapp</option>
    </select>

    <label>GESTION</label>
    <select id="gestion" required>
      <option value="">Seleccione...</option>
      <option>Cerrado</option><option>Cierre video llamada</option><option>Seguimiento</option><option>Video llamada</option>
    </select>

    <label>CREAMOS</label>
    <select id="creamos" required>
      <option value="">Seleccione...</option>
      <option>RMA</option><option>RMA MANO A MANO</option><option>BONO DEVOLUCION</option>
      <option>BONO SERVICIO</option><option>REFACTURACION</option><option>REFACTURACION SOSTENIMIENTO</option>
      <option>ODT</option><option>ODS</option><option>NINGUNA</option>
    </select>

    <label># FACTURA</label>
    <input type="text" id="factura" required pattern="[A-Za-z0-9\-]+" title="Solo letras, números o guiones">

    <label>BACK SACO DE GESTION?</label>
    <select id="backsaco" required>
      <option value="">Seleccione...</option>
      <option>SI, TIENE LLAMADA Y GESTION</option>
      <option>SI, PERO SOLO PARAFRASEARON GESTION</option>
      <option>NO, ACTUALIZACION DEL ESTADO DE LA RMA</option>
      <option>OTROS</option>
    </select>

    <button type="submit">Guardar en Google Sheets</button>
    <div id="msg" class="message"></div>
  </form>
</div>

<!-- REGISTROS -->
<div id="records-section" class="section">
  <div class="filter-container">
    <h2>📋 Registros Guardados</h2>
    <div class="filters">
      <div>
        <label>Gestor</label>
        <input type="text" id="filter-gestor" placeholder="Buscar por gestor">
      </div>
      <div>
        <label>Tipo</label>
        <select id="filter-tipo">
          <option value="">Todos</option>
          <option>QUEJA</option><option>SOLICITUD</option><option>ODS</option><option>INFORMACION</option>
        </select>
      </div>
      <div>
        <label>Clase</label>
        <input type="text" id="filter-clase" placeholder="Buscar clase">
      </div>
      <div>
        <label>Desde</label>
        <input type="date" id="filter-desde">
      </div>
      <div>
        <label>Hasta</label>
        <input type="date" id="filter-hasta">
      </div>
    </div>
    <div class="filter-actions">
      <button id="btn-refresh">🔄 Actualizar</button>
      <button id="btn-export">⬇️ Exportar Excel</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table id="records-table">
      <thead>
      <tr>
      <th>CASO</th><th>GESTOR</th><th>FECHA</th><th>TIPO</th><th>CLASE</th>
      <th>ORIGEN</th><th>GESTIÓN</th><th>CREAMOS</th><th>FACTURA</th><th>BACKSACO</th>
     </tr>
  </thead>
      <tbody><tr><td colspan="10" style="text-align:center;">Sin datos</td></tr></tbody>
    </table>
  </div>

  <!-- CONTROLES DE PAGINACIÓN -->
  <div class="pagination" style="display: none;">
    <button id="btn-first">« Primera</button>
    <button id="btn-prev">‹ Anterior</button>
    
    <div class="pagination-info">
      Página <span id="current-page">1</span> de <span id="total-pages">1</span>
      (<span id="total-records">0</span> registros)
    </div>
    
    <div class="page-numbers" id="page-numbers">
      <!-- Los números de página se generan dinámicamente -->
    </div>
    
    <button id="btn-next">Siguiente ›</button>
    <button id="btn-last">Última »</button>
  </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycby-bP4KlT3pO5BoMvlqFbwCIuML9vQIHQ5i3zeKAa4OP2Q-pdgeII8qSNepjvOV3qUh0A/exec";

// Inicializar fecha actual
document.getElementById("fecha").value = new Date().toLocaleDateString("es-CO");

// Variables para paginación
let currentPage = 1;
const recordsPerPage = 10;
let allRecords = [];
let filteredRecords = [];

// Tabs
const formTab = document.getElementById("tab-form");
const recordsTab = document.getElementById("tab-records");
const formSection = document.getElementById("form-section");
const recordsSection = document.getElementById("records-section");

formTab.onclick = () => {
  formSection.classList.add("visible");
  recordsSection.classList.remove("visible");
  formTab.classList.add("active");
  recordsTab.classList.remove("active");
};
recordsTab.onclick = () => {
  formSection.classList.remove("visible");
  recordsSection.classList.add("visible");
  recordsTab.classList.add("active");
  formTab.classList.remove("active");
  loadRecords();
};

// Envío de formulario
const form = document.getElementById("case-form");
const msg = document.getElementById("msg");

form.addEventListener("submit", e => {
  e.preventDefault();
  msg.style.display = "none";

  const data = {
    caso: form.caso.value,
    gestor: form.gestor.value,
    fecha: form.fecha.value,
    tipo: form.tipo.value,
    clase: form.clase.value,
    origen: form.origen.value,
    gestion: form.gestion.value,
    creamos: form.creamos.value,
    factura: form.factura.value,
    backsaco: form.backsaco.value
  };

  fetch(scriptURL, {
    method: "POST",
    body: new URLSearchParams(data),
    headers: {"Content-Type": "application/x-www-form-urlencoded"}
  })
  .then(r => r.ok ? r.text() : Promise.reject(r.statusText))
  .then(() => {
    msg.textContent = "✅ Registro guardado correctamente";
    msg.className = "message success"; msg.style.display = "block";
    form.reset();
    form.gestor.value = "Johan Sebastian Ovalle Cardenas (Postventa A2)";
    form.fecha.value = new Date().toLocaleDateString("es-CO");
  })
  .catch(err => {
    msg.textContent = "❌ Error al guardar: " + err;
    msg.className = "message error"; msg.style.display = "block";
  });
});

// Mostrar registros con filtros
const tableBody = document.querySelector("#records-table tbody");
const filters = {
  gestor: document.getElementById("filter-gestor"),
  tipo: document.getElementById("filter-tipo"),
  clase: document.getElementById("filter-clase"),
  desde: document.getElementById("filter-desde"),
  hasta: document.getElementById("filter-hasta")
};

document.getElementById("btn-refresh").onclick = loadRecords;
document.getElementById("btn-export").onclick = exportExcel;

// Controles de paginación - CORREGIDOS
const paginationContainer = document.querySelector('.pagination');
const btnFirst = document.getElementById('btn-first');
const btnPrev = document.getElementById('btn-prev'); // CORREGIDO
const btnNext = document.getElementById('btn-next'); // CORREGIDO
const btnLast = document.getElementById('btn-last');
const currentPageSpan = document.getElementById('current-page');
const totalPagesSpan = document.getElementById('total-pages');
const totalRecordsSpan = document.getElementById('total-records');
const pageNumbersContainer = document.getElementById('page-numbers');

// Event listeners para paginación - CORREGIDOS
btnFirst.addEventListener('click', () => goToPage(1));
btnPrev.addEventListener('click', () => goToPage(currentPage - 1));
btnNext.addEventListener('click', () => goToPage(currentPage + 1));
btnLast.addEventListener('click', () => goToPage(Math.ceil(filteredRecords.length / recordsPerPage)));

function loadRecords() {
  tableBody.innerHTML = `<tr><td colspan="10" style="text-align:center;">⏳ Cargando...</td></tr>`;
  fetch(`${scriptURL}?action=getData`)
    .then(res => res.json())
    .then(data => {
      allRecords = data;
      applyFilters();
    })
    .catch(() => {
      tableBody.innerHTML = `<tr><td colspan="10" style="text-align:center;">❌ Error al cargar los registros</td></tr>`;
    });
}

function applyFilters() {
  filteredRecords = [...allRecords];
  
  if (filters.gestor.value)
    filteredRecords = filteredRecords.filter(r => r.GESTOR.toLowerCase().includes(filters.gestor.value.toLowerCase()));
  if (filters.tipo.value)
    filteredRecords = filteredRecords.filter(r => r.TIPO === filters.tipo.value);
  if (filters.clase.value)
    filteredRecords = filteredRecords.filter(r => r.CLASE.toLowerCase().includes(filters.clase.value.toLowerCase()));

  const desde = filters.desde.value ? new Date(filters.desde.value) : null;
  const hasta = filters.hasta.value ? new Date(filters.hasta.value) : null;

  if (desde || hasta) {
    filteredRecords = filteredRecords.filter(r => {
      const [d, m, y] = r.FECHA.split('/');
      const fechaRegistro = new Date(`${y}-${m}-${d}`);
      if (desde && fechaRegistro < desde) return false;
      if (hasta && fechaRegistro > hasta) return false;
      return true;
    });
  }

  // Reiniciar a la primera página después de aplicar filtros
  currentPage = 1;
  displayPage();
}

function displayPage() {
  const totalPages = Math.ceil(filteredRecords.length / recordsPerPage);
  
  // Mostrar u ocultar controles de paginación
  if (filteredRecords.length > recordsPerPage) {
    paginationContainer.style.display = 'flex';
  } else {
    paginationContainer.style.display = 'none';
  }

  // Actualizar información de paginación
  currentPageSpan.textContent = currentPage;
  totalPagesSpan.textContent = totalPages;
  totalRecordsSpan.textContent = filteredRecords.length;

  // Habilitar/deshabilitar botones - CORREGIDOS
  btnFirst.disabled = currentPage === 1;
  btnPrev.disabled = currentPage === 1;
  btnNext.disabled = currentPage === totalPages;
  btnLast.disabled = currentPage === totalPages;

  // Generar números de página
  generatePageNumbers(totalPages);

  // Calcular registros para la página actual
  const startIndex = (currentPage - 1) * recordsPerPage;
  const endIndex = Math.min(startIndex + recordsPerPage, filteredRecords.length);
  const pageRecords = filteredRecords.slice(startIndex, endIndex);

  // Mostrar registros
  if (!pageRecords.length) {
    tableBody.innerHTML = `<tr><td colspan="10" style="text-align:center;">Sin resultados</td></tr>`;
    return;
  }

  tableBody.innerHTML = "";
  pageRecords.forEach(r => {
    const row = `<tr>
      <td>${r.CASO}</td>
      <td>${r.GESTOR}</td>
      <td>${r.FECHA}</td>
      <td>${r.TIPO}</td>
      <td>${r.CLASE}</td>
      <td>${r.ORIGEN}</td>
      <td>${r.GESTION}</td>
      <td>${r.CREAMOS}</td>
      <td>${r.FACTURA}</td>
      <td>${r.BACKSACO}</td>
    </tr>`;
    tableBody.insertAdjacentHTML("beforeend", row);
  });
}

function generatePageNumbers(totalPages) {
  pageNumbersContainer.innerHTML = '';
  
  // Mostrar máximo 5 números de página
  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, startPage + 4);
  
  // Ajustar si estamos cerca del final
  if (endPage - startPage < 4) {
    startPage = Math.max(1, endPage - 4);
  }
  
  for (let i = startPage; i <= endPage; i++) {
    const pageBtn = document.createElement('button');
    pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
    pageBtn.textContent = i;
    pageBtn.addEventListener('click', () => goToPage(i));
    pageNumbersContainer.appendChild(pageBtn);
  }
}

function goToPage(page) {
  const totalPages = Math.ceil(filteredRecords.length / recordsPerPage);
  if (page < 1 || page > totalPages) return;
  
  currentPage = page;
  displayPage();
  
  // Scroll suave hacia la parte superior de la tabla
  document.querySelector('.table-wrapper').scrollIntoView({ 
    behavior: 'smooth', 
    block: 'start' 
  });
}

// Exportar Excel con columnas separadas correctamente
function exportExcel() {
  if (!filteredRecords.length) {
    alert("No hay datos para exportar");
    return;
  }

  // Usar punto y coma como separador (más compatible con Excel)
  const headers = Object.keys(filteredRecords[0]);
  const csvContent = [
    headers.join(";"), // Usar punto y coma en lugar de coma
    ...filteredRecords.map(row => 
      headers.map(header => {
        let cell = row[header] || "";
        // Escapar comillas y envolver en comillas si contiene punto y coma
        cell = String(cell).replace(/"/g, '""');
        if (cell.includes(";") || cell.includes('"') || cell.includes("\n")) {
          cell = `"${cell}"`;
        }
        return cell;
      }).join(";")
    )
  ].join("\n");

  // Agregar BOM para UTF-8 (importante para Excel)
  const BOM = "\uFEFF";
  const blob = new Blob([BOM + csvContent], { type: "text/csv;charset=utf-8;" });
  
  const link = document.createElement("a");
  const url = URL.createObjectURL(blob);
  const fecha = new Date().toISOString().split("T")[0];
  link.setAttribute("href", url);
  link.setAttribute("download", `registros_${fecha}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

// Agregar event listeners para filtros en tiempo real
filters.gestor.addEventListener('input', applyFilters);
filters.tipo.addEventListener('change', applyFilters);
filters.clase.addEventListener('input', applyFilters);
filters.desde.addEventListener('change', applyFilters);
filters.hasta.addEventListener('change', applyFilters);
</script>

</body>
</html>
